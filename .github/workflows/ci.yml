name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve SPM dependencies
        run: |
          xcodebuild \
            -project ClaudeOmator.xcodeproj \
            -scheme ClaudeOmator \
            -disableAutomaticPackageResolution \
            -resolvePackageDependencies

      - name: Build
        run: |
          xcodebuild \
            -project ClaudeOmator.xcodeproj \
            -scheme ClaudeOmator \
            -configuration Debug \
            -derivedDataPath /tmp/derived-data \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
